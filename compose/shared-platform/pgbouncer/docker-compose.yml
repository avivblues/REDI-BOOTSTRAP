# REDI Shared Platform — PgBouncer (pools to HAProxy Patroni router on mjk)
services:
  pgbouncer:
    image: ${PGBOUNCER_IMAGE:-edoburu/pgbouncer:1.22.1-p0}
    container_name: redi-pgbouncer
    restart: unless-stopped
    networks:
      redi-internal:
        aliases:
          - postgres.redi.internal
          - postgres
    volumes:
      - ${SHARED_CONFIG_PATH}/pgbouncer/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro
      - ${SHARED_CONFIG_PATH}/pgbouncer/userlist.txt:/etc/pgbouncer/userlist.txt:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 5432"]
      interval: 15s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

networks:
  redi-internal:
    external: true
