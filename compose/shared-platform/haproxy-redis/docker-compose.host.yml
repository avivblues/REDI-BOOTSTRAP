# REDI — HAProxy Redis on host network (failover: backend is remote mesh IP)
services:
  haproxy-redis:
    image: ${HAPROXY_IMAGE}
    container_name: redi-redis-haproxy
    restart: unless-stopped
    network_mode: host
    volumes:
      - ${SHARED_CONFIG_PATH}/haproxy-redis.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    healthcheck:
      test: ["CMD", "haproxy", "-c", "-f", "/usr/local/etc/haproxy/haproxy.cfg"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
