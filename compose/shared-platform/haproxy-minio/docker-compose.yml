# REDI Shared Platform — HAProxy MinIO Distributed Load Balancer
services:
  haproxy-minio:
    image: ${HAPROXY_IMAGE:-haproxy:2.9-alpine}
    container_name: redi-minio-haproxy
    restart: unless-stopped
    env_file:
      - ../.env
    network_mode: host
    volumes:
      - /opt/redi/config/shared-platform/haproxy-minio.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    healthcheck:
      test: ["CMD", "haproxy", "-c", "-f", "/usr/local/etc/haproxy/haproxy.cfg"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
