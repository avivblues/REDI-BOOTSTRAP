# REDI Shared Platform — HAProxy Patroni router (docker bridge → mesh Spilo :5433)
services:
  haproxy:
    image: ${HAPROXY_IMAGE}
    container_name: redi-shared-haproxy
    restart: unless-stopped
    env_file:
      - ../.env
    networks:
      redi-internal:
        aliases:
          - pg-router.redi.internal
    volumes:
      - ${SHARED_CONFIG_PATH}/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    healthcheck:
      test: ["CMD", "haproxy", "-c", "-f", "/usr/local/etc/haproxy/haproxy.cfg"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

networks:
  redi-internal:
    external: true
