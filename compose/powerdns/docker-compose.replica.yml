# Replica stack — PowerDNS only (remote MariaDB on primary via Tailscale)
# MariaDB container cannot run in Proxmox LXC; backend points to redi-jkt-01

services:
  pdns-auth:
    image: ${PDNS_IMAGE}
    container_name: redi-pdns-auth
    restart: unless-stopped
    networks:
      - redi-dns
    ports:
      - "53:53/tcp"
      - "53:53/udp"
      - "${PDNS_TAILSCALE_IP:-127.0.0.1}:${PDNS_WEBSERVER_PORT}:8081"
    environment:
      MARIADB_PDNS_USER: ${MARIADB_PDNS_USER}
      MARIADB_PDNS_PASSWORD: ${MARIADB_PDNS_PASSWORD}
      MARIADB_DATABASE: ${MARIADB_DATABASE}
      PDNS_API_KEY: ${PDNS_API_KEY}
      PDNS_WEBSERVER_ADDRESS: ${PDNS_WEBSERVER_ADDRESS}
      PDNS_WEBSERVER_PORT: ${PDNS_WEBSERVER_PORT}
      PDNS_WEBSERVER_ALLOW_FROM: ${PDNS_WEBSERVER_ALLOW_FROM}
      PDNS_HOSTNAME: ${PDNS_HOSTNAME}
      PDNS_SOA_RNAME: ${PDNS_SOA_RNAME}
      PDNS_SOA_REFRESH: ${PDNS_SOA_REFRESH}
      PDNS_SOA_RETRY: ${PDNS_SOA_RETRY}
      PDNS_SOA_EXPIRE: ${PDNS_SOA_EXPIRE}
      PDNS_SOA_MINIMUM: ${PDNS_SOA_MINIMUM}
    volumes:
      - ${PDNS_CONFIG_PATH}/pdns.conf:/etc/powerdns/pdns.conf:ro
      - ${PDNS_LOG_PATH}/pdns:/var/log/pdns
    healthcheck:
      test: ["CMD-SHELL", "pdns_control rping || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    security_opt:
      - no-new-privileges:true
    cap_add:
      - NET_BIND_SERVICE
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

networks:
  redi-dns:
    external: true
