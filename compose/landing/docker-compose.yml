# =============================================================================
# REDI LAB — Landing Page + Status Dashboard
# Deploy on redi-jkt-01 (edge primary)
# =============================================================================

services:
  landing:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${LANDING_IMAGE:-redi-landing:1.0}
    container_name: redi-landing
    restart: unless-stopped
    networks:
      - redi-proxy
      - redi-dns
      - redi-management
    volumes:
      - ${LANDING_CONFIG_PATH}/nodes.json:/app/config/nodes.json:ro
      - ${LANDING_CONFIG_PATH}/services.json:/app/config/services.json:ro
      - ${LANDING_CONFIG_PATH}/static:/app/static:ro
    labels:
      - "traefik.enable=false"
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

networks:
  redi-proxy:
    external: true
  redi-dns:
    external: true
  redi-management:
    external: true
