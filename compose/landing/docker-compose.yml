# =============================================================================
# REDI LAB — Landing Page + Status Dashboard
# Deploy on redi-jkt-01 (edge primary)
# =============================================================================

services:
  landing:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${LANDING_IMAGE:-redi-landing:1.0}
    container_name: redi-landing
    restart: unless-stopped
    networks:
      - redi-proxy
      - redi-dns
      - redi-management
    volumes:
      - ${LANDING_CONFIG_PATH}/nodes.json:/app/config/nodes.json:ro
      - ${LANDING_CONFIG_PATH}/services.json:/app/config/services.json:ro
      - ${LANDING_CONFIG_PATH}/static:/app/static:ro
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=redi-proxy"
      # HTTPS
      - "traefik.http.routers.redi-landing.rule=Host(`letsredi.com`) || Host(`www.letsredi.com`) || Host(`status.letsredi.com`)"
      - "traefik.http.routers.redi-landing.entrypoints=websecure"
      - "traefik.http.routers.redi-landing.tls=true"
      - "traefik.http.routers.redi-landing.tls.certresolver=letsencrypt-http"
      - "traefik.http.routers.redi-landing.tls.domains[0].main=letsredi.com"
      - "traefik.http.routers.redi-landing.tls.domains[0].sans=www.letsredi.com"
      # HTTP (works while ACME provisions or as fallback)
      - "traefik.http.routers.redi-landing-http.rule=Host(`letsredi.com`) || Host(`www.letsredi.com`) || Host(`status.letsredi.com`)"
      - "traefik.http.routers.redi-landing-http.entrypoints=web"
      - "traefik.http.routers.redi-landing-http.service=redi-landing"
      - "traefik.http.routers.redi-landing.middlewares=security-headers@file"
      - "traefik.http.routers.redi-landing.service=redi-landing"
      - "traefik.http.services.redi-landing.loadbalancer.server.port=8080"
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

networks:
  redi-proxy:
    external: true
  redi-dns:
    external: true
  redi-management:
    external: true
