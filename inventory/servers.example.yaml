  # VPS 1 — Jakarta (Edge Primary)
  # ---------------------------------------------------------------------------
  - id: redi-jkt-01
    hostname: redi-jkt-01
    role_ref: role-edge-primary
    site: jakarta
    status: active
    secrets_ref: redi-jkt-01
    labels:
      tier: edge
      region: jkt
    os:
      distribution: ubuntu
      version: "22.04"
      min_vcpu: 2
      min_memory_gb: 4
      min_disk_gb: 40

  # ---------------------------------------------------------------------------
  # VPS 2 — Surabaya (Edge Secondary)
