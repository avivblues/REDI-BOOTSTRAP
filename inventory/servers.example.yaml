# Non-sensitive metadata only. Connection data → secrets/servers.yaml
# =============================================================================

schema_version: "1.0"

metadata:
  description: "REDI LAB production node inventory — 3 VPS"
  maintainer: "platform-team"
  last_reviewed: "2026-06-29"

servers:
