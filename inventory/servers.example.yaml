    status: active
    secrets_ref: redi-sby-01
    labels:
      tier: edge
      region: sby
    os:
      distribution: ubuntu
      version: "22.04"
      min_vcpu: 2
      min_memory_gb: 4
      min_disk_gb: 40

  # ---------------------------------------------------------------------------
