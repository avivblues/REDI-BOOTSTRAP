global
  log stdout format raw local0
  maxconn 4096

defaults
  log global
  mode tcp
  timeout connect 5s
  timeout client  1m
  timeout server  1m

# PostgreSQL HA — routes to Patroni leader only
listen postgres
  bind 0.0.0.0:5432
  option tcpka
  option httpchk
  http-check connect port 8008
  http-check send meth GET uri /master
  http-check expect status 200
  default-server inter 3s fall 3 rise 2 on-marked-down shutdown-sessions
  server mjk ${MJK_MESH_IP}:${POSTGRES_MJK_PORT} check port 8008
  server jkt ${JKT_MESH_IP}:${POSTGRES_JKT_PORT} check port 8008

# Redis HA — Sentinel-managed master via health script in container
listen redis
  bind 0.0.0.0:6379
  option tcpka
  server redis-master ${REDIS_MASTER_HOST}:6379 check
