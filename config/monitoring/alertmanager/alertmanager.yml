global:
  resolve_timeout: 5m

route:
  receiver: redi-default
  group_by: [alertname, node, instance]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

receivers:
  - name: redi-default

inhibit_rules:
  - source_matchers:
      - severity="critical"
    target_matchers:
      - severity="warning"
    equal: [alertname, node, instance]
