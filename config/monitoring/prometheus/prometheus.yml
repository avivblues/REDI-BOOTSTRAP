global:
  scrape_interval: 30s
  evaluation_interval: 30s
  external_labels:
    cluster: redi-cloud
    environment: production

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - redi-alertmanager:9093

rule_files:
  - /etc/prometheus/alerts/*.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090

  - job_name: alertmanager
    static_configs:
      - targets:
          - redi-alertmanager:9093

  - job_name: node-exporter
    static_configs:
      - targets:
          - 100.79.82.92:9102
          - 100.81.86.37:9102
          - 100.67.138.25:9102
        labels:
          role: infrastructure
    relabel_configs:
      - source_labels: [__address__]
        regex: 100\.79\.82\.92:9102
        target_label: node
        replacement: redi-jkt-01
      - source_labels: [__address__]
        regex: 100\.81\.86\.37:9102
        target_label: node
        replacement: redi-mjk-01
      - source_labels: [__address__]
        regex: 100\.67\.138\.25:9102
        target_label: node
        replacement: redi-sby-01

  - job_name: cadvisor
    static_configs:
      - targets:
          - 100.79.82.92:8085
          - 100.81.86.37:8085
          - 100.67.138.25:8085
        labels:
          role: docker

  - job_name: blackbox-http
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - https://git.letsredi.com
          - https://registry.letsredi.com
          - https://auth.letsredi.com
          - https://grafana.letsredi.com
          - https://status.letsredi.com
          - https://minio.letsredi.com
        labels:
          probe: public-https
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: redi-blackbox-exporter:9115

  - job_name: blackbox-tcp
    metrics_path: /probe
    params:
      module: [tcp_connect]
    static_configs:
      - targets:
          - 100.81.86.37:5432
          - 100.81.86.37:6379
          - 100.81.86.37:9000
          - 100.79.82.92:8929
          - 100.81.86.37:8929
          - 100.67.138.25:8929
          - 100.81.86.37:9443
        labels:
          probe: platform-tcp
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: redi-blackbox-exporter:9115
