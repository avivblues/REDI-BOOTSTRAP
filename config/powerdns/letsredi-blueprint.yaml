# =============================================================================
# REDI LAB — letsredi.com DNS Blueprint (canonical policy)
# Placeholder classification: config/powerdns/placeholder-policy.yaml (Task 008C)
# Public placeholders → CNAME placeholder.letsredi.com
# Internal placeholders → A {mjk_mesh}
# =============================================================================

zone: letsredi.com
default_ttl: 3600

targets:
  jkt_public: "103.149.238.98"
  sby_public: "103.80.214.144"
  jkt_mesh: "100.79.82.92"
  sby_mesh: "100.67.138.25"
  mjk_mesh: "100.81.86.37"
  gateway_public: "103.149.238.98"
  gateway_cname: "proxy.letsredi.com"
  placeholder_cname: "placeholder.letsredi.com"

records:
  # --- Placeholder anchor (Task 008C) ---
  - name: placeholder.letsredi.com
    type: CNAME
    value: proxy.letsredi.com
    ttl: 3600
    status: production
    note: "Public placeholder landing — undeployed services"

  # --- Infrastructure (glue: never overwrite if present) ---
  - name: ns1.letsredi.com
    type: A
    value: "{jkt_public}"
    ttl: 3600
    status: glue-do-not-touch
    note: "Primary NS glue"

  - name: ns2.letsredi.com
    type: A
    value: "{sby_public}"
    ttl: 3600
    status: glue-do-not-touch
    note: "Secondary NS glue"

  - name: dns.letsredi.com
    type: CNAME
    value: ns1.letsredi.com
    ttl: 3600
    status: production
    note: "PowerDNS primary"

  - name: proxy.letsredi.com
    type: CNAME
    value: traefik-jkt.letsredi.com
    ttl: 3600
    status: production
    note: "REDI Gateway (Traefik primary)"

  - name: mesh.letsredi.com
    type: A
    value: "{jkt_mesh}"
    ttl: 3600
    status: production
    note: "Mesh entry (Tailscale primary)"

  - name: gateway.letsredi.com
